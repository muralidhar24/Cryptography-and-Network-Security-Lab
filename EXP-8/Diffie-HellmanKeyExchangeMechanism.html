
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Diffie-Hellman Key Exchange Demo</title>
<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f4f4f4;
}
.container{
    background:white;
    padding:20px;
    margin:40px auto;
    width:400px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
button{
    padding:10px 20px;
    font-size:16px;
    margin-top:15px;
    cursor:pointer;
}
.result{
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<h2>Diffie-Hellman Key Exchange</h2>

<p>Public Prime (p): <input type="number" id="p" value=""></p>
<p>Generator (g): <input type="number" id="g" value=""></p>

<p>Alice Private Key: <input type="number" id="a" value=""></p>
<p>Bob Private Key: <input type="number" id="b" value=""></p>

<button onclick="calculateDH()">Generate Shared Secret</button>

<div class="result" id="output"></div>

</div>

<script>

function modExp(base, exp, mod){
    let result = 1;
    for(let i=0;i<exp;i++){
        result = (result * base) % mod;
    }
    return result;
}

function calculateDH(){

    let p = parseInt(document.getElementById("p").value);
    let g = parseInt(document.getElementById("g").value);

    let a = parseInt(document.getElementById("a").value);
    let b = parseInt(document.getElementById("b").value);

    // Public keys
    let A = modExp(g,a,p);
    let B = modExp(g,b,p);

    // Shared secrets
    let secretAlice = modExp(B,a,p);
    let secretBob = modExp(A,b,p);

    document.getElementById("output").innerHTML =
        "Alice Public Key: " + A + "<br>" +
        "Bob Public Key: " + B + "<br><br>" +
        "Shared Secret (Alice): " + secretAlice + "<br>" +
        "Shared Secret (Bob): " + secretBob;

}

</script>

</body>
</html>
